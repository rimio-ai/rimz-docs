name: Sync upstream docs

on:
  repository_dispatch:
    types: [docs-updated]
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

concurrency:
  group: sync

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/checkout@v7
        with:
          repository: rimio-ai/rimz
          path: rimz
      - run: RIMZ_SRC=rimz node scripts/sync-content.mjs
      - id: commit
        run: |
          git add content public
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git -c user.name="github-actions[bot]" \
                -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
                commit -m "docs(content): sync from rimz@$(git -C rimz rev-parse --short HEAD)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: sync
    if: needs.sync.outputs.changed == 'true'
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/deploy.yml
